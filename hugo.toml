baseURL = "https://www.insidethatad.com"
locale = "en-US"
title = "Inside That Ad"
theme = "mainroad"
paginate = 10
enableRobotsTXT = true
summaryLength = 70

[params]
  description = "Have you ever walked by, driven past, or seen an advertisement and wondered who done it? I know I have. So please enjoy the answers right here at Inside That Ad."
  opengraph = true
  twitter_cards = true
  readmore = true
  authorbox = false
  pager = true
  post_meta = ["date", "categories"]
  dateformat = "January 2, 2006"
  toc = false
  comments = true
  customCSS = ["/css/custom.css"]
  googleFontsLink = "https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700;800&display=swap"

  [params.logo]
    image = "/images/banner.png"
    title = "Inside That Ad"
    subtitle = "Have you ever wondered who made that ad?"

  [params.sidebar]
    home = "right"
    list = "right"
    single = "right"
    widgets = ["recent", "categories", "ad-square"]

  [params.widgets]
    recent_num = 4

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Submit an Ad"
    url = "/submit-an-ad/"
    weight = 2
  [[menu.main]]
    name = "Contact Me"
    url = "/contact-me/"
    weight = 3

[[params.social]]
  name = "Twitter"
  icon = "fa-brands fa-x-twitter"
  link = "https://x.com/insidethatad"

[[params.social]]
  name = "Facebook"
  icon = "fa-brands fa-facebook"
  link = "https://www.facebook.com/InsideThatAd"

[[params.social]]
  name = "LinkedIn"
  icon = "fa-brands fa-linkedin"
  link = "https://www.linkedin.com/in/abdallahanwar/"

[[params.social]]
  name = "YouTube"
  icon = "fa-brands fa-youtube"
  link = "https://www.youtube.com/@AutomationMaestro"

[[params.social]]
  name = "Instagram"
  icon = "fa-brands fa-instagram"
  link = "https://www.instagram.com/insidethatad/"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
