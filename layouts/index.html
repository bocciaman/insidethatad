{{ define "main" }}
<main class="main" role="main">

  {{- $posts := where .Site.RegularPages "Type" "posts" }}
  {{- $pager := .Paginate $posts }}
  <div class="card-grid">
    {{- range $pager.Pages }}
    {{ partial "post-card.html" . }}
    {{- end }}
  </div>

  {{ partial "pager.html" . }}

</main>
{{ end }}
