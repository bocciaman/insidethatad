<footer class="footer">
  <div class="footer__main">
    <div class="footer__logo">
      <a href="/" title="{{ .Site.Title }}">
        <img src="/images/banner.png" alt="{{ .Site.Title }}" class="footer__logo-img">
      </a>
    </div>

    <nav class="footer__nav">
      <a href="/privacy-policy/" class="footer__nav-link">Privacy Policy</a>
      <a href="/terms-of-service/" class="footer__nav-link">Terms of Service</a>
      <a href="/sitemap.xml" class="footer__nav-link">Sitemap</a>
    </nav>

    <div class="footer__social">
      {{- range .Site.Params.social }}
      <a href="{{ .link }}" title="{{ .name }}" target="_blank" rel="noopener noreferrer" class="footer__social-link">
        <i class="{{ .icon }}"></i>
      </a>
      {{- end }}
    </div>
  </div>

  <div class="footer__bottom">
    &copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights reserved.
  </div>
</footer>
