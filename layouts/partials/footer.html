<footer class="footer">
  <div class="footer__main">
    <nav class="footer__nav">
      <a href="/privacy-policy/" class="footer__nav-link">Privacy Policy</a>
      <a href="/terms-of-service/" class="footer__nav-link">Terms of Service</a>
      <a href="/sitemap.xml" class="footer__nav-link">Sitemap</a>
    </nav>

    <div class="footer__social">
      {{- range .Site.Params.social }}
      <a href="{{ .link }}" title="{{ .name }}" target="_blank" rel="noopener noreferrer" class="footer__social-link">
        <i class="{{ .icon }}"></i>
      </a>
      {{- end }}
    </div>
  </div>

  <div class="footer__properties">
    <span class="footer__properties-label">Other Properties</span>
    <nav class="footer__properties-nav">
      <a href="https://abanwar.com" class="footer__nav-link" target="_blank" rel="noopener noreferrer">AB Anwar</a>
      <a href="https://homecalcs.net" class="footer__nav-link" target="_blank" rel="noopener noreferrer">HomeCalcs</a>
    </nav>
  </div>

  <div class="footer__bottom">
    &copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights reserved.
  </div>
</footer>
