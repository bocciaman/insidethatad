{{- if .Site.Menus.main }}
<nav class="menu">
  <button class="menu__btn" aria-haspopup="true" aria-expanded="false" tabindex="0">
    <span class="menu__btn-title" tabindex="-1">{{ T "menu_label" }}</span>
  </button>
  <ul class="menu__list">
    {{- $currentNode := . }}
    {{- range .Site.Menus.main }}
    {{- if not .Parent }}
    <li class="menu__item{{ if or ($currentNode.IsMenuCurrent "main" .) ($currentNode.HasMenuCurrent "main" .) }} menu__item--active{{ end }}">
      <a class="menu__link" href="{{ .URL }}">
        <span class="menu__text">{{ .Name }}</span>
      </a>
    </li>
    {{- end }}
    {{- end }}

    <!-- Search -->
    <li class="menu__item menu__item--search">
      <form class="nav-search" role="search" method="get" action="/search/">
        <input class="nav-search__input" type="search" name="q" placeholder="Search posts…" aria-label="Search">
        <button class="nav-search__btn" type="submit" aria-label="Search">
          <i class="fa fa-search"></i>
        </button>
      </form>
    </li>
  </ul>
</nav>

{{ else -}}
<div class="divider"></div>
{{- end }}
