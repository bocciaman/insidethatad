<article class="post-card">
  <a href="{{ .RelPermalink }}" class="post-card__img-link">
    <img
      class="post-card__img"
      src="{{ .Params.cover.image | default "/img/default-post.jpg" }}"
      alt="{{ .Title }}"
      loading="lazy">
  </a>
  <div class="post-card__body">
    {{- with .Params.categories }}
    <p class="post-card__category">{{ index . 0 }}</p>
    {{- end }}
    <h2 class="post-card__title">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h2>
    {{- $agency := .Params.agency | default "Unknown" }}
    {{- if ne $agency "Unknown" }}
    <p class="post-card__agency">{{ $agency }}</p>
    {{- end }}
    <p class="post-card__excerpt">{{ .Summary | plainify | truncate 160 }}</p>
    <p class="post-card__date">{{ .Date.Format "January 2, 2006" }}</p>
  </div>
</article>
