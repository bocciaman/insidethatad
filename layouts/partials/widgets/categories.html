{{- $featured := slice "advertising" "campaigns" "art" "tv-commercials" }}
<div class="widget-categories widget">
  <h4 class="widget__title">Categories</h4>
  <div class="widget__content">
    <ul class="widget__list">
      {{- range $featured }}
        {{- with $.Site.GetPage (printf "/categories/%s" .) }}
        <li class="widget__item">
          <a class="widget__link" href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
        {{- end }}
      {{- end }}
    </ul>
    <p class="taglist-more"><a href="/categories/">View all categories →</a></p>
  </div>
</div>
